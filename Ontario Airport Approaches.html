<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ontario Airports">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/61/61212.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#070b15">
<title>Ontario Airports — Approach Procedures & METAR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b15;--panel:#0b1120;--border:#162038;--accent:#00c8f0;--accent2:#ff6b35;--green:#00ff88;--yellow:#ffd700;--red:#ff3366;--text:#b8cce0;--dim:#3a5070;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);padding-bottom:env(safe-area-inset-bottom);-webkit-tap-highlight-color:transparent;}
header{background:linear-gradient(90deg,#070b15 0%,#0a1d3a 50%,#070b15 100%);border-bottom:1px solid var(--accent);padding:8px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 0 40px rgba(0,200,240,0.12);flex-shrink:0;}
header h1{font-family:'Rajdhani',sans-serif;font-size:1.1rem;color:var(--accent);letter-spacing:3px;font-weight:700;}
.header-sub{font-size:0.65rem;color:var(--dim);letter-spacing:2px;}
.live-badge{margin-left:auto;font-size:0.65rem;color:var(--green);display:flex;align-items:center;gap:6px;border:1px solid rgba(0,255,136,0.3);padding:3px 10px;border-radius:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:0.2;box-shadow:none}}
.main{display:flex;flex:1;overflow:hidden;position:relative;}
#map{flex:1;background:#050810;}
.leaflet-tile-pane{filter:brightness(0.45) saturate(0.5) hue-rotate(185deg) contrast(1.1);}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--accent)!important;border-color:var(--border)!important;}
.sidebar{width:400px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sidebar-tab{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:9px;background:none;border:none;color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:0.6rem;letter-spacing:2px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,200,240,0.05);}
.airport-list{overflow-y:auto;flex:1;}
.airport-list::-webkit-scrollbar{width:3px;}
.airport-list::-webkit-scrollbar-thumb{background:var(--accent);}
.airport-item{padding:10px 14px;border-bottom:1px solid rgba(22,32,56,0.8);cursor:pointer;transition:all 0.15s;display:grid;grid-template-columns:54px 1fr auto;align-items:center;gap:10px;}
.airport-item:hover{background:rgba(0,200,240,0.05);}
.airport-item.active{background:rgba(0,200,240,0.1);border-left:2px solid var(--accent);}
.airport-icao{font-family:'Rajdhani',sans-serif;font-size:0.78rem;color:var(--accent);}
.airport-name{font-size:0.7rem;color:var(--text);line-height:1.4;}
.airport-elev{font-size:0.6rem;color:var(--dim);}
.airport-msa{font-size:0.6rem;color:#00c8f0;letter-spacing:1px;}
.airport-apps{font-size:0.58rem;color:var(--accent2);}
.wx-badge{font-size:0.58rem;padding:2px 5px;border-radius:2px;border:1px solid;text-align:center;min-width:38px;}
.vfr{color:var(--green);border-color:var(--green);background:rgba(0,255,136,0.07);}
.mvfr{color:var(--yellow);border-color:var(--yellow);background:rgba(255,215,0,0.07);}
.ifr{color:var(--red);border-color:var(--red);background:rgba(255,51,102,0.07);}
.lifr{color:#ff44cc;border-color:#ff44cc;background:rgba(255,68,204,0.07);}
.wx-unknown{color:var(--dim);border-color:var(--dim);}
.detail-panel{display:none;flex-direction:column;overflow:hidden;flex:1;}
.detail-panel.show{display:flex;}
.detail-scroll{overflow-y:auto;flex:1;padding:14px;}
.detail-scroll::-webkit-scrollbar{width:3px;}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--accent);}
.detail-header{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.detail-icao{font-family:'Rajdhani',sans-serif;font-size:1.6rem;color:var(--accent);letter-spacing:3px;font-weight:700;}
.detail-name{font-size:0.72rem;color:var(--text);margin:2px 0;}
.detail-coords{font-size:0.62rem;color:var(--dim);}
.wind-display{display:flex;align-items:center;gap:16px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 14px;margin-bottom:12px;border-radius:2px;}
.wind-compass{position:relative;width:90px;height:90px;flex-shrink:0;}
.wind-compass svg{width:100%;height:100%;}
.wind-data{flex:1;}
.wind-row{display:flex;justify-content:space-between;font-size:0.68rem;margin-bottom:5px;}
.wind-label{color:var(--dim);}
.wind-val{color:var(--yellow);}
.wind-big{font-family:'Rajdhani',sans-serif;font-size:1.3rem;color:var(--accent);line-height:1;margin-bottom:8px;}
.wind-unit{font-size:0.6rem;color:var(--dim);}
.metar-box{background:rgba(0,0,0,0.35);border:1px solid var(--border);border-left:3px solid var(--dim);padding:10px 12px;margin-bottom:12px;border-radius:2px;}
.box-label{font-size:0.58rem;color:var(--dim);letter-spacing:2px;margin-bottom:6px;}
.metar-raw{color:var(--accent);word-break:break-all;line-height:1.7;font-size:0.7rem;}
.decoded-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;margin-top:8px;}
.decoded-item{font-size:0.65rem;}
.decoded-key{color:var(--dim);}
.decoded-val{color:var(--text);}
.section-title{font-family:'Rajdhani',sans-serif;font-size:0.6rem;color:var(--accent2);letter-spacing:2px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(255,107,53,0.25);display:flex;align-items:center;gap:8px;}
.section-count{background:rgba(255,107,53,0.2);color:var(--accent2);border-radius:10px;padding:1px 7px;font-size:0.58rem;}
.approach-item{background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden;}
.approach-hdr{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.15s;user-select:none;}
.approach-hdr:hover{background:rgba(255,107,53,0.07);}
.app-type{font-size:0.58rem;padding:2px 5px;border-radius:1px;font-weight:bold;min-width:32px;text-align:center;color:#000;}
.app-name{color:var(--text);font-size:0.7rem;flex:1;}
.app-rwy{color:var(--dim);font-size:0.62rem;}
.app-chevron{color:var(--dim);transition:transform 0.2s;font-size:0.7rem;}
.app-chevron.open{transform:rotate(90deg);}
.waypoints-list{display:none;}
.iaf-label{background:rgba(10,18,30,0.82)!important;border:1px solid rgba(0,119,170,0.5)!important;border-radius:2px!important;padding:2px 5px!important;color:#ccc!important;font-size:10px!important;font-family:'IBM Plex Mono',monospace!important;white-space:nowrap!important;pointer-events:none!important;box-shadow:0 1px 4px rgba(0,0,0,0.6)!important;}
.iaf-label::before{display:none!important;}
.wpt-toggle-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.wpt-toggle-label{font-size:0.55rem;color:var(--dim);letter-spacing:1px;user-select:none;}
.wpt-toggle{position:relative;display:inline-block;width:28px;height:15px;cursor:pointer;flex-shrink:0;}
.wpt-toggle input{opacity:0;width:0;height:0;position:absolute;}
.wpt-toggle-slider{position:absolute;inset:0;background:#1a2a3a;border:1px solid #2a4060;border-radius:15px;transition:background 0.2s;}
.wpt-toggle-slider::after{content:'';position:absolute;width:11px;height:11px;left:1px;top:1px;background:#3a5070;border-radius:50%;transition:transform 0.2s,background 0.2s;}
.wpt-toggle input:checked+.wpt-toggle-slider{background:rgba(0,119,170,0.3);border-color:#0077aa;}
.wpt-toggle input:checked+.wpt-toggle-slider::after{transform:translateX(13px);background:#00c8f0;}
.waypoints-list.show{display:block;}
.wp-header{display:grid;grid-template-columns:20px 70px 1fr auto;gap:4px;padding:5px 12px;font-size:0.58rem;color:var(--dim);letter-spacing:1px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);}
.wp-row{display:grid;grid-template-columns:20px 70px 1fr auto;gap:4px;padding:5px 12px;font-size:0.65rem;border-top:1px dotted rgba(22,32,56,0.8);align-items:center;cursor:pointer;transition:background 0.1s;}
.wp-row:hover{background:rgba(0,200,240,0.06);}
.wp-seq{color:var(--dim);font-size:0.6rem;}
.wp-fix{font-weight:bold;}
.wp-type-badge{font-size:0.58rem;color:var(--dim);}
.wp-coords{color:var(--text);font-size:0.58rem;}





.leaflet-popup-content-wrapper{background:var(--panel)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:3px!important;box-shadow:0 4px 20px rgba(0,0,0,0.6)!important;font-family:'IBM Plex Mono',monospace!important;font-size:0.72rem!important;}
.leaflet-popup-tip{background:var(--panel)!important;}
.leaflet-popup-content{margin:10px 14px!important;}
.popup-icao{font-family:'Rajdhani',sans-serif;color:var(--accent);font-size:0.85rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.popup-name{color:var(--text);margin:3px 0 5px;font-size:0.68rem;}
.popup-metar{color:var(--dim);font-size:0.62rem;word-break:break-all;margin-top:4px;line-height:1.5;}
.popup-wind{color:var(--yellow);margin:4px 0;font-size:0.68rem;display:flex;align-items:center;gap:6px;}
.popup-btn{margin-top:8px;background:rgba(0,200,240,0.1);border:1px solid var(--accent);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:0.65rem;padding:5px 10px;cursor:pointer;width:100%;letter-spacing:1px;transition:background 0.2s;}
.popup-btn:hover{background:rgba(0,200,240,0.2);}
.source-badge{font-size:0.58rem;color:var(--accent2);border:1px solid rgba(255,107,53,0.3);padding:1px 5px;border-radius:2px;margin-left:auto;}
.wx-source-btn{background:none;border:1px solid var(--border);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:3px 8px;cursor:pointer;border-radius:2px;transition:all 0.2s;letter-spacing:1px;}
.wx-source-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,240,0.08);}
.wx-source-btn:hover{border-color:var(--accent);color:var(--accent);}
.wx-refresh-btn{background:none;border:1px solid var(--border);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:0.65rem;padding:3px 8px;cursor:pointer;border-radius:2px;transition:all 0.2s;margin-left:4px;}
.wx-refresh-btn:hover{border-color:var(--green);color:var(--green);}
.wx-refresh-btn.spinning{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.wx-source-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}

</style>
</head>
<body>
<header>
  <div>
    <h1>ONTARIO AIRSPACE</h1>
    <div class="header-sub">CZYZ FIR · APPROACH PROCEDURES · METAR</div>
  </div>
  <div style="font-size:0.65rem;color:var(--dim);border-left:1px solid var(--border);padding-left:16px;">
    <span style="color:var(--dim);">AIRPORTS</span><br>
    <span style="color:var(--accent);font-family:Rajdhani,sans-serif;" id="airport-count">—</span>
    &nbsp;·&nbsp;
    <span style="color:var(--accent2);font-family:Rajdhani,sans-serif;" id="approach-count">—</span>
    <span style="color:var(--dim);"> APPR</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;margin-left:auto;">
    <div class="wx-source-row">
      <span style="font-size:0.58rem;color:var(--dim);letter-spacing:1px;">WX SOURCE:</span>
      <button class="wx-source-btn" id="src-avwx" onclick="setSource('avwx')">AVIATIONWEATHER</button>
      <button class="wx-source-btn active" id="src-vatsim" onclick="setSource('vatsim')">VATSIM</button>
      <div style="display:inline-flex;align-items:center;gap:4px;margin-left:6px;font-size:0.65rem;">
        <div class="dot" id="wx-dot"></div>
        <span id="live-badge-text" style="color:var(--dim);font-family:'IBM Plex Mono',monospace;">READY</span>
        <button class="wx-refresh-btn" id="refresh-btn" onclick="refreshMETARs()" title="Refresh METAR data">↻</button>
      </div>
    </div>
    <div style="font-size:0.58rem;color:var(--dim);text-align:right;" id="wx-source-label">aviationweather.gov · updated <span id="wx-age">—</span></div>
  </div>
</header>
<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-tab">
      <button class="tab-btn active" id="tab-list" onclick="showTab('list')">AIRPORTS</button>
      <button class="tab-btn" id="tab-detail" onclick="showTab('detail')">DETAIL</button>
    </div>
    <div id="view-list" class="airport-list"></div>
    <div id="view-detail" class="detail-panel">
      <div class="detail-scroll" id="detail-scroll">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--dim);gap:8px;font-size:0.7rem;">
          <div style="font-size:2.5rem;opacity:0.2">✈</div>SELECT AN AIRPORT
        </div>
      </div>
    </div>
  </div></div>
</div>
</div>

function parseMETAR(raw) {

    arrow=`<line x1="${tailX}" y1="${tailY}" x2="${bx}" y2="${by}" stroke="${catCol}" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/><polygon points="${tipX},${tipY} ${bx+hw*Math.cos(pA)},${by+hw*Math.sin(pA)} ${bx-hw*Math.cos(pA)},${by-hw*Math.sin(pA)}" fill="${catCol}"/><circle cx="${tailX}" cy="${tailY}" r="2" fill="${catCol}" opacity="0.5"/>`;
  } else {
    arrow=`<text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#2a4060" font-size="9" font-family="Rajdhani">VRB</text>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88"><circle cx="${cx}" cy="${cy}" r="${r+4}" fill="rgba(0,0,0,0.5)"/><circle cx="${cx}" cy="${cy}" r="${r+2}" fill="none" stroke="#0e1825" stroke-width="1.5"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#162038" stroke-width="1"/>${gustRing}${ticks}${arrow}<circle cx="${cx}" cy="${cy}" r="3" fill="#070b15" stroke="${catCol}" stroke-width="1.5"/><text x="${cx}" y="${cy+20}" text-anchor="middle" fill="${catCol}" font-size="7" font-family="Rajdhani" opacity="0.7">${dir!==null?dir+'°':'—'}</text></svg>`;
}

// Use Promise.race for timeout — avoids AbortSignal cloning issues in some browsers
function fetchWithTimeout(url, ms) {
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Request timed out')), ms)
  );
  return Promise.race([fetch(url), timeout]);
}

async function fetchFromAvwx(ids) {
  // JSON endpoint — confirmed field name is rawOb
  const url = `https://aviationweather.gov/api/data/metar?ids=${ids}&format=json&hours=2`;
  const res = await fetchWithTimeout(url, 10000);
  if(!res.ok) throw new Error(`avwx ${res.status}`);
  const data = await res.json();
  // API wraps results in a "data" key after Sept 2025 update, or returns array directly
  const items = Array.isArray(data) ? data : (data.data || []);
  let count = 0;
  items.forEach(m => {
    const raw = m.rawOb || m.raw_text || m.rawMessage;
    const icao = m.icaoId || m.station_id || m.icao;
    if(raw && icao) { metarData[icao] = parseMETAR(raw); count++; }
  });
  if(count === 0) throw new Error('no avwx data');
  return count;
}

async function fetchFromVatsim(icaoList) {
  // VATSIM METAR API — public, no auth, CORS enabled
  // Returns JSON array of {id, metar} where metar omits the station prefix
  const ids = icaoList.join(',');
  const url = `https://metar.vatsim.net/${ids}?format=json`;
  const res = await fetchWithTimeout(url, 10000);
  if(!res.ok) throw new Error(`VATSIM ${res.status}`);
  const data = await res.json();
  const items = Array.isArray(data) ? data : [];
  let count = 0;
  items.forEach(m => {
    const icao = m.id;
    // VATSIM metar field omits station ID — prepend it so parseMETAR works
    const raw = m.metar ? `${icao} ${m.metar}` : null;
    if(raw && icao) { metarData[icao] = parseMETAR(raw); count++; }
  });
  if(count === 0) throw new Error('no VATSIM data');
  return count;
}

async function fetchMETARs() {
  const ids = AIRPORTS.map(a=>a.icao).join(',');
  const icaoList = AIRPORTS.map(a=>a.icao);
  let count = 0;
  let usedSource = currentSource;

  // Try primary source, then retry once, then fallback
  for(let attempt = 0; attempt < 2; attempt++) {
    try {
      if(currentSource === 'vatsim') {
        count = await fetchFromVatsim(icaoList);
      } else {
        count = await fetchFromAvwx(ids);
      }
      break; // success
    } catch(e) {
      if(attempt === 0) {
        console.warn(`Primary source retry (${currentSource}):`, e.message);
        await new Promise(r => setTimeout(r, 2000)); // wait 2s before retry
      } else {
        console.warn(`Primary source (${currentSource}) failed after retry:`, e.message);
      }
    }
  }

  if(count === 0) {
    // Fallback to other source
    try {
      if(currentSource === 'vatsim') {
        count = await fetchFromAvwx(ids);
        usedSource = 'avwx';
      } else {
        count = await fetchFromVatsim(icaoList);
        usedSource = 'vatsim';
      }
      console.info('Fallback source succeeded:', usedSource);
    } catch(e2) {
      console.warn('Both sources failed, using demo data');
      usedSource = 'demo';
      const demo={
        CYOW:"CYOW 011900Z 27015G22KT 15SM FEW040 BKN080 06/M02 A2978",
        CYHM:"CYHM 011900Z 24008KT 10SM SCT035 OVC080 08/04 A2975",
        CYXU:"CYXU 011900Z 21012KT 6SM -RA BKN015 OVC040 07/06 A2972",
        CYKF:"CYKF 011900Z 22010KT 10SM FEW050 BKN180 09/03 A2973",
        CYSB:"CYSB 011900Z 31020G30KT 15SM SCT060 BKN200 02/M08 A2990",
        CYQT:"CYQT 011900Z 28018KT 20SM FEW080 01/M10 A2998",
        CYAM:"CYAM 011900Z 30014KT 15SM CLR 03/M06 A2992",
        CYTS:"CYTS 011900Z 32012KT 15SM BKN060 00/M09 A2995",
        CYOO:"CYOO 011900Z 24009KT 10SM SCT025 OVC060 09/05 A2975",
        CYPQ:"CYPQ 011900Z 23007KT 12SM BKN040 08/04 A2977",
        CYQG:"CYQG 011900Z 19012KT 8SM -RA OVC020 09/07 A2968",
        CYZR:"CYZR 011900Z 20010KT 10SM SCT030 OVC100 10/07 A2970",
        CYQA:"CYQA 011900Z 26008KT 15SM FEW050 05/M02 A2982",
        CYMO:"CYMO 011900Z 34006KT 12SM SCT040 01/M04 A2988",
        CYYB:"CYYB 011900Z 31016KT 20SM CLR 00/M12 A2999",
        CYVV:"CYVV 011900Z 25006KT 12SM FEW040 06/02 A2980",
        CYTZ:"CYTZ 011900Z 25010KT 10SM SCT020 OVC060 09/06 A2974",
      };
      Object.entries(demo).forEach(([k,v])=>{metarData[k]=parseMETAR(v);});
      count = Object.keys(demo).length;
    }
  }

  lastFetchTime = Date.now();
  const label = usedSource === 'demo' ? 'DEMO DATA' : `LIVE · ${count} STN`;
  setBadge(label, usedSource !== 'demo');
  updateAgeLabel(usedSource);
}

function drawMapWindCompass(icao) {
  // Remove existing wind marker
  if(windMarker) {
    if(windMarker.remove) windMarker.remove();
    else map.removeLayer(windMarker);
    windMarker=null;
  }
  if(!icao) return;

  const ap = AIRPORTS.find(a=>a.icao===icao);
  const m = metarData[icao];
  if(!ap || !m) return;

  const cat = m.flightCat || 'UNKNOWN';
  const catCol = {VFR:'#00ff88',MVFR:'#ffd700',IFR:'#ff3366',LIFR:'#ff44cc'}[cat]||'#3a5070';

  // Position: just to the right of MSA bubble (MSA is at lat+0.03, lon+0)
  const lat = ap.lat + 0.03;
  const lon = ap.lon + 0.055;

  // Double-size SVG wind compass (120x120)
  const cx=60,cy=60,r=48;
  let ticks='';
  ['N','E','S','W'].forEach((c,i)=>{
    const a=(i*90-90)*Math.PI/180;
    const r1=r-4;
    ticks+=`<line x1="${cx+r1*Math.cos(a)}" y1="${cy+r1*Math.sin(a)}" x2="${cx+(r+2)*Math.cos(a)}" y2="${cy+(r+2)*Math.sin(a)}" stroke="#2a4060" stroke-width="2"/>`;
    ticks+=`<text x="${cx+(r-18)*Math.cos(a)}" y="${cy+(r-18)*Math.sin(a)+4}" text-anchor="middle" fill="${c==='N'?'#00c8f0':'#2a4060'}" font-size="${c==='N'?12:10}" font-family="Rajdhani,sans-serif">${c}</text>`;
  });

  let arrow='';
  let dirLabel='—';
  if(m.windDir!==null && m.windDirStr!=='VRB'){
    const ang=(m.windDir-90)*Math.PI/180;
    const tailX=cx+(r-10)*Math.cos(ang), tailY=cy+(r-10)*Math.sin(ang);
    const tipX=cx-24*Math.cos(ang), tipY=cy-24*Math.sin(ang);
    const pA=ang+Math.PI/2, hw=8;
    const bx=tipX+16*Math.cos(ang), by=tipY+16*Math.sin(ang);
    arrow=`<line x1="${tailX}" y1="${tailY}" x2="${bx}" y2="${by}" stroke="${catCol}" stroke-width="4" stroke-linecap="round"/><polygon points="${tipX},${tipY} ${bx+hw*Math.cos(pA)},${by+hw*Math.sin(pA)} ${bx-hw*Math.cos(pA)},${by-hw*Math.sin(pA)}" fill="${catCol}"/>`;
    dirLabel=m.windDir+'°';
  } else if(m.windDirStr==='VRB'){
    arrow=`<text x="${cx}" y="${cy+6}" text-anchor="middle" fill="${catCol}" font-size="14" font-family="Rajdhani">VRB</text>`;
    dirLabel='VRB';
  }

  const spdStr = m.windSpd!==null ? m.windSpd+(m.windUnit||'KT') : '—';
  const gustStr = m.windGust ? ` G${m.windGust}` : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120"><circle cx="${cx}" cy="${cy}" r="${r+6}" fill="rgba(7,11,21,0.85)"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#162038" stroke-width="1.5"/>${ticks}${arrow}<circle cx="${cx}" cy="${cy}" r="5" fill="#070b15" stroke="${catCol}" stroke-width="2"/></svg>`;

  const label = `<div style="text-align:center;font-family:Rajdhani,sans-serif;font-size:11px;color:${catCol};margin-top:2px;white-space:nowrap;">${dirLabel} ${spdStr}${gustStr}</div>`;

  const icon = L.divIcon({
    html: `<div style="display:inline-block;">${svg}${label}</div>`,
    iconSize: [1,1],
    iconAnchor: [0,0],
    className: ''
  });

  // Place as draggable div overlay instead of Leaflet marker
  const mapEl = document.getElementById('map');
  const pt = map.latLngToContainerPoint([lat, lon]);

  const div = document.createElement('div');
  div.id = 'wind-compass-drag';
  div.innerHTML = `<div id="wind-drag-handle" title="Drag to move" style="cursor:grab;position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;"></div>${svg}${label}`;
  Object.assign(div.style, {
    position:'absolute', zIndex:1000,
    left: pt.x + 'px', top: pt.y + 'px',
    display:'inline-block', pointerEvents:'all',
    userSelect:'none'
  });
  mapEl.appendChild(div);
  windMarker = div; // store ref so we can remove it

  // Drag logic
  const wHandle = div.querySelector('#wind-drag-handle');
  let wDragging=false, wox=0, woy=0;

  function wStartDrag(cx,cy){
    wDragging=true;
    wox=cx-div.offsetLeft; woy=cy-div.offsetTop;
    wHandle.style.cursor='grabbing';
    map.dragging.disable();
    map.touchZoom.disable();
  }
  function wMoveDrag(cx,cy){
    if(!wDragging)return;
    const maxX=mapEl.offsetWidth-div.offsetWidth;
    const maxY=mapEl.offsetHeight-div.offsetHeight;
    div.style.left=Math.min(Math.max(0,cx-wox),maxX)+'px';
    div.style.top=Math.min(Math.max(0,cy-woy),maxY)+'px';
  }
  function wEndDrag(){
    if(!wDragging)return;
    wDragging=false;
    wHandle.style.cursor='grab';
    map.dragging.enable();
    map.touchZoom.enable();
    _justDragged=true;
    setTimeout(()=>{_justDragged=false;},200);
  }

  wHandle.addEventListener('mousedown',e=>{ wStartDrag(e.clientX,e.clientY); e.preventDefault(); e.stopPropagation(); });
  wHandle.addEventListener('touchstart',e=>{ const t=e.touches[0]; wStartDrag(t.clientX,t.clientY); e.preventDefault(); e.stopPropagation(); },{passive:false});
  document.addEventListener('mousemove',e=>wMoveDrag(e.clientX,e.clientY));
  document.addEventListener('touchmove',e=>{ if(!wDragging)return; const t=e.touches[0]; wMoveDrag(t.clientX,t.clientY); e.preventDefault(); },{passive:false});
  document.addEventListener('mouseup',wEndDrag);
  document.addEventListener('touchend',wEndDrag);
}

function selectAirport(icao) {
  selectedIcao=icao;

  const li=document.getElementById('li-'+icao);
  if(li){li.classList.add('active');li.scrollIntoView({block:'nearest'});}

  approachLayers={};
  showTab('detail');
  renderDetail(icao);
  drawMapWindCompass(icao);
}

function drawApproach(layerId,idx,icao) {
  const ap=AIRPORTS.find(a=>a.icao===icao);
  if(!ap||!ap.approaches[idx])return;
  const appr=ap.approaches[idx];
  const typeCol={ILS:'#00c8f0',RNAV:'#00ff88',RNP:'#ff00cc',VOR:'#e8a020',NDB:'#ff6b35',LOC:'#88ccff'};
  const color=typeCol[appr.type]||'#888';
  const segs=appr.segments;
  const layer=L.layerGroup();
  const roleCol={final:'#00c8f0',intermediate:'#ffd700',initial:'#ff6b35'};

  // Group consecutive arc segments into polylines for smooth curves.
  // Non-arc segments are drawn individually as before.
  // Strategy: walk segs, accumulate arc runs, flush as single polyline.
  const drawArcGroup = (pts, st) => {
    if(pts.length < 2) return;
    L.polyline(pts, {
      color, weight: st==='final' ? 3 : 2,
      opacity: st==='final' ? 0.95 : st==='intermediate' ? 0.65 : 0.45,
      dashArray: null  // arcs drawn solid — curve shape itself shows it's RF
    }).addTo(layer);
  };

  let arcPts = [], arcSt = null;
  segs.forEach((seg, i) => {
    const a = seg.a, b = seg.b;
    const st = seg.segType;

    if(seg.arc) {
      // Accumulate arc points; bridge gap if last point doesn't match segment start
      if(arcSt === null) arcSt = st;
      if(arcPts.length === 0) arcPts.push([a.lat, a.lon]);
      // If there's a gap (named fix mid-arc), include it
      const last = arcPts[arcPts.length-1];
      if(Math.abs(last[0]-a.lat)>0.0001 || Math.abs(last[1]-a.lon)>0.0001) {
        arcPts.push([a.lat, a.lon]);
      }
      arcPts.push([b.lat, b.lon]);
    } else {
      // Flush any pending arc group
      if(arcPts.length > 1) { drawArcGroup(arcPts, arcSt); arcPts = []; arcSt = null; }
      // Draw straight segment — skip if both ends are arc coords (shouldn't happen now)
      if(a.fix.startsWith('__C') && b.fix.startsWith('__C')) return;
      if(b.fix.startsWith('__C')) return; // trailing arc coord — skip straight line to it
      L.polyline([[a.lat,a.lon],[b.lat,b.lon]],{
        color,
        weight:  st==='final' ? 3    : st==='intermediate' ? 2    : 1.5,
        opacity: st==='final' ? 0.95 : st==='intermediate' ? 0.65 : 0.45,
        dashArray: st==='final' ? null : st==='intermediate' ? '10,6' : '5,9'
      }).addTo(layer);
    }
  });
  // Flush trailing arc group
  if(arcPts.length > 1) drawArcGroup(arcPts, arcSt);

  // Collect unique named fix nodes with their role (role = most "advanced" segment they appear in)
  const fixRank={final:3,intermediate:2,initial:1};
  const fixMap={};
  segs.forEach(seg=>{
    const rank=fixRank[seg.segType]||0;
    [seg.a, seg.b].forEach(node=>{
      if(node.fix.startsWith('__C')) return; // internal arc tessellation point
      const key=node.fix;
      if(!fixMap[key]||fixRank[fixMap[key].segType]<rank){
        fixMap[key]={...node, segType:seg.segType};
      }
    });
  });

  // Find the MAP: endpoint of the final segment (b-side of final segs, closest to airport)
  const finalSegs=segs.filter(s=>s.segType==='final');
  let mapNode=null;
  if(finalSegs.length>0){
    // b-side of final segments — pick the one farthest from the IAFs (smallest lat spread)
    // Actually just use b of first final seg; they all converge
    const namedFinalSeg = finalSegs.slice().reverse().find(s=>!s.b.fix.startsWith('__C'));
    mapNode = namedFinalSeg ? namedFinalSeg.b : (finalSegs[0].b.fix.startsWith('__C') ? finalSegs[0].a : finalSegs[0].b);
  }

  // Place waypoint markers
  const shapeForType=(st)=>{
    if(st==='final') return 'circle';
    if(st==='intermediate') return 'diamond';
    return 'triangle';
  };
  Object.values(fixMap).forEach(node=>{
    const wc=roleCol[node.segType]||'#888';
    const roleLabel={final:'FAF/MAP',intermediate:'IF',initial:'IAF'}[node.segType]||'FIX';
    const shape=shapeForType(node.segType);
    let svgShape;
    if(shape==='circle'){
      svgShape=`<circle cx="8" cy="8" r="5.5" fill="${wc}" fill-opacity="0.25" stroke="${wc}" stroke-width="2"/>`;
    } else if(shape==='diamond'){
      svgShape=`<polygon points="8,1 15,8 8,15 1,8" fill="${wc}" fill-opacity="0.25" stroke="${wc}" stroke-width="1.5"/>`;
    } else {
      svgShape=`<polygon points="8,2 14,14 2,14" fill="${wc}" fill-opacity="0.2" stroke="${wc}" stroke-width="1.5"/>`;
    }
    const icon=L.divIcon({
      html:`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">${svgShape}</svg>`,
      iconSize:[16,16],iconAnchor:[8,8],className:''
    });
    const tooltipContent =
      `<b style="color:#0077aa">${node.fix}</b> <span style="color:#555;font-size:10px">[${roleLabel}]</span><br>`+
      `<span style="color:#555;font-size:10px">${node.lat.toFixed(4)}°N ${Math.abs(node.lon).toFixed(4)}°W</span>`;
    const fixMarker = L.marker([node.lat,node.lon],{icon});
    fixMarker._wptTooltipContent = tooltipContent;
    fixMarker.bindTooltip(tooltipContent,
      {direction:'top', offset:[0,-4], permanent: wptLabelsOn, className: 'iaf-label'});
    fixMarker.addTo(layer);
  });

  // RWY label + extended centreline at MAP node
  if(mapNode){
    // Find runway heading from RWY_DATA
    // Strip leading zero only from pure-numeric runway IDs, not letter-suffixed ones (06L → keep as-is)
    const rwyNum = /^\d+$/.test(appr.rwy) ? appr.rwy.replace(/^0/,'') : appr.rwy;
    const rwyEntries = (RWY_DATA[icao]||[]);
    const rwyInfo = rwyEntries.find(r=>r.rwy===appr.rwy||r.rwy===rwyNum||(/^\d+$/.test(r.rwy)&&r.rwy.replace(/^0/,'')===rwyNum));
    const hdg = rwyInfo ? parseFloat(rwyInfo.hdg) : null;



    // Place label at midpoint of the final segment, offset perpendicularly
    // so it sits clearly to the side of the line with no overlap
    const finalSeg = segs.find(s=>s.segType==='final' && !s.b.fix.startsWith('__C') && !s.arc)
                  || segs.find(s=>s.segType==='final' && !s.arc)
                  || segs.find(s=>s.segType==='final');
    const segA = finalSeg ? finalSeg.a : mapNode;
    const segB = finalSeg ? (finalSeg.b.fix.startsWith('__C') ? finalSeg.a : finalSeg.b) : mapNode;

    // Midpoint of final segment
    const midLat = (segA.lat + segB.lat) / 2;
    const midLon = (segA.lon + segB.lon) / 2;

    // Direction vector of the final segment
    const dLat = segB.lat - segA.lat;
    const dLon = (segB.lon - segA.lon) * Math.cos(midLat * Math.PI/180);
    const len = Math.sqrt(dLat*dLat + dLon*dLon) || 1;

    // Perpendicular (rotate 90° right)
    const perpLat = -dLon / len;
    const perpLon =  dLat / len;

    // Offset distance: ~0.025° (~1.5nm) — enough to clear all markers
    const offset = 0.025;
    const labelLat = midLat + perpLat * offset;
    const labelLon = midLon + perpLon * offset / Math.cos(midLat * Math.PI/180);

    // Anchor: left edge of label faces the line (iconAnchor x=0 means left edge at point)
    // Determine which side the offset landed — if label is left of path anchor right edge instead
    // Simple: always anchor the edge closest to the segment at the label point
    // We'll use anchor at left edge and let the label extend away from the line
    L.marker([labelLat, labelLon],{
      icon:L.divIcon({
        html:`<div style="font-family:Rajdhani;font-size:9px;font-weight:900;color:#000;white-space:nowrap;background:${color};border:1.5px solid #fff;border-radius:3px;padding:2px 5px;box-shadow:0 2px 6px rgba(0,0,0,0.8);line-height:1.35;display:inline-block"><div>RWY ${appr.rwy}</div><div style="font-size:7px;opacity:0.9">${appr.name}</div></div>`,
        iconSize:[1,1], iconAnchor:[0,0], className:''
      })
    }).addTo(layer);
  }

  layer.addTo(map);
  approachLayers[layerId]=layer;
}

function renderDetail(icao) {
  const ap=AIRPORTS.find(a=>a.icao===icao);
  const m=metarData[icao];
  const cat=m?m.flightCat:'UNKNOWN';

  let windHTML='';
  if(m&&(m.windDir!==null||m.windDirStr==='VRB')){
    const spdStr=m.windSpd!==null?m.windSpd:'—',gustStr=m.windGust?`G${m.windGust}`:'',dirStr=m.windDir!==null?`${m.windDir}°`:'VRB';
    windHTML=`<div class="wind-display"><div class="wind-compass">${windCompassSVG(m.windDir,m.windSpd,m.windGust,m.windUnit,cat)}</div>
    <div class="wind-data"><div class="wind-big">${spdStr}${gustStr} <span class="wind-unit">${m.windUnit}</span></div>
    <div class="wind-row"><span class="wind-label">DIRECTION</span><span class="wind-val">${dirStr}</span></div>
    ${m.windGust?`<div class="wind-row"><span class="wind-label">GUSTING</span><span class="wind-val">${m.windGust} ${m.windUnit}</span></div>`:''}
    <div class="wind-row"><span class="wind-label">FLIGHT CAT</span><span class="wx-badge ${cat.toLowerCase()}">${cat}</span></div></div></div>`;
  } else {
    windHTML=`<div class="wind-display"><div class="wind-compass">${windCompassSVG(null,0,null,'KT',cat)}</div>
    <div class="wind-data"><div class="wind-big" style="font-size:0.9rem;color:var(--dim)">CALM</div>
    <div class="wind-row"><span class="wind-label">FLIGHT CAT</span><span class="wx-badge ${cat.toLowerCase()}">${cat}</span></div></div></div>`;
  }

  const metarHTML=m?`<div class="metar-box"><div class="box-label">▸ RAW METAR</div><div class="metar-raw">${m.raw}</div>
    <div class="decoded-grid">
      ${m.vis?`<div class="decoded-item"><span class="decoded-key">VIS </span><span class="decoded-val">${m.vis}</span></div>`:''}
      ${m.cloud?`<div class="decoded-item"><span class="decoded-key">SKY </span><span class="decoded-val">${m.cloud}</span></div>`:''}
      ${m.temp?`<div class="decoded-item"><span class="decoded-key">TEMP</span><span class="decoded-val">${m.temp}</span></div>`:''}
      ${m.dew?`<div class="decoded-item"><span class="decoded-key">DEW </span><span class="decoded-val">${m.dew}</span></div>`:''}
      ${m.altimeter?`<div class="decoded-item"><span class="decoded-key">ALT </span><span class="decoded-val">${m.altimeter}</span></div>`:''}
    </div></div>`
  :`<div class="metar-box"><div class="box-label">▸ RAW METAR</div><div style="color:var(--dim);font-size:0.68rem;margin-top:6px;">NO METAR AVAILABLE</div></div>`;

  const typeCol={ILS:'#00c8f0',RNAV:'#00ff88',RNP:'#ff00cc',VOR:'#e8a020',NDB:'#ff6b35',LOC:'#88ccff'};
  const approaches=ap?ap.approaches:[];
  let appHTML=`<div class="section-title">APPROACH PROCEDURES <span class="section-count">${approaches.length}</span> <span class="source-badge">CZYZ NAVDATA 2506</span>
    <span class="wpt-toggle-wrap">
      <span class="wpt-toggle-label">WAYPOINT LABELS</span>
      <label class="wpt-toggle" title="Toggle waypoint labels on map">
        <input type="checkbox" id="wpt-labels-chk" ${wptLabelsOn?'checked':''} onchange="toggleWptLabels(this.checked)">
        <span class="wpt-toggle-slider"></span>
      </label>
    </span>
  </div>`;
  if(approaches.length===0){
    appHTML+=`<div style="color:var(--dim);font-size:0.68rem;padding:8px 0;">No approach procedures in dataset for this airport.</div>`;
  }
  const roleGuess=(segType)=>({final:'FAF/MAP',intermediate:'IF',initial:'IAF'}[segType]||'FIX');
  const roleCol={final:'var(--accent)',intermediate:'var(--yellow)',initial:'var(--accent2)'};
  approaches.forEach((app,idx)=>{
    const tid=`app-${icao}-${idx}`;
    const tc=typeCol[app.type]||'#888';
    // Build unique fix list from segments for display, ordered initial->intermediate->final
    const fixRank={final:3,intermediate:2,initial:1};
    const fixMap={};
    app.segments.forEach(seg=>{
      [seg.a,seg.b].forEach(node=>{
        if(node.fix==='COORD') return;
        const key=node.fix;
        if(!fixMap[key]||fixRank[fixMap[key].segType]<fixRank[seg.segType]){
          fixMap[key]={...node,segType:seg.segType};
        }
      });
    });
    const fixes=Object.values(fixMap).sort((a,b)=>fixRank[a.segType]-fixRank[b.segType]);
    appHTML+=`<div class="approach-item">
      <div class="approach-hdr" onclick="toggleApproach('${tid}',${idx},'${icao}')">
        <span class="app-type" style="background:${tc}">${app.type}</span>
        <span class="app-name">${app.name}</span>
        <span class="app-rwy">RWY ${app.rwy}</span>
        <span class="app-chevron" id="chev-${tid}">▶</span>
      </div>
      <div class="waypoints-list" id="${tid}">
        <div class="wp-header"><span>#</span><span>FIX</span><span>COORDINATES</span><span>ROLE</span></div>
        ${fixes.map((node,i)=>{
          const rc=roleCol[node.segType]||'#888';
          return `<div class="wp-row">
            <span class="wp-seq">${i+1}</span>
            <span class="wp-fix" style="color:${rc}">${node.fix}</span>
            <span class="wp-coords">${node.lat.toFixed(4)}°N  ${Math.abs(node.lon).toFixed(4)}°W</span>
            <span style="color:${rc};font-size:0.58rem">[${roleGuess(node.segType)}]</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  document.getElementById('detail-scroll').innerHTML=`
    <div class="detail-header">
      <div class="detail-icao">${icao}</div>
      <div class="detail-name">${ap?ap.name:''}</div>
      ${MSA_DATA[icao]?'<div style="font-size:0.65rem;color:#ffcc00;letter-spacing:1px;margin:2px 0;">MSA '+MSA_DATA[icao]+'ft</div>':''}
      ${SAFE100_DATA[icao]?'<div style="font-size:0.65rem;color:#00c8f0;letter-spacing:1px;margin:2px 0;">SAFE 100NM '+SAFE100_DATA[icao]+'ft</div>':''}
      <div class="detail-coords">${ap?`${ap.lat.toFixed(4)}°N  ${Math.abs(ap.lon).toFixed(4)}°W  ·  CLASS ${ap.airClass}  ·  ELEV ${ap.elev}ft`:''}</div>
      ${RWY_LENGTHS[icao]?`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;">
        ${Object.entries(RWY_LENGTHS[icao]).map(([pair,len])=>`
          <div style="font-size:0.62rem;background:rgba(0,200,240,0.07);border:1px solid var(--border);border-left:2px solid var(--accent);padding:3px 8px;border-radius:2px;">
            <span style="color:var(--dim);font-size:0.55rem;letter-spacing:1px;">RWY </span>
            <span style="color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:0.65rem;">${pair}</span>
            <span style="color:var(--text);margin-left:5px;">${len.toLocaleString()} ft</span>
          </div>`).join('')}
      </div>`:''}
    </div>
    ${windHTML}${metarHTML}${appHTML}`;
}

// ─── Init ─────────────────────────────────────────────
// ── Draggable floating airport card ──────────────────────────────────────────
let _dragPanel=null, _justDragged=false;

function closeDragPanel(){
  if(_dragPanel){_dragPanel.remove();_dragPanel=null;}
}

function showDragPanel(ap, screenX, screenY){
  closeDragPanel();
  const mx=metarData[ap.icao];
  const catC=(mx?mx.flightCat:'UNKNOWN').toLowerCase();
  const catC2={VFR:'#00ff88',MVFR:'#ffd700',IFR:'#ff3366',LIFR:'#ff44cc'}[mx?mx.flightCat:'']||'#888';
  const windStr=mx&&mx.windDir!==null?`${mx.windDir}° @ ${mx.windSpd} ${mx.windUnit}`:mx&&mx.windDirStr==='VRB'?`VRB @ ${mx.windSpd} ${mx.windUnit}`:mx?'CALM':'METAR LOADING...';
  let miniComp='';
  if(mx&&mx.windDir!==null){
    const a=(mx.windDir-90)*Math.PI/180;
    const tx=16-11*Math.cos(a),ty=16-11*Math.sin(a),bx=16+8*Math.cos(a),by=16+8*Math.sin(a),pa=a+Math.PI/2,hw=3.5;
    miniComp=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" style="vertical-align:middle;margin-right:5px"><circle cx="14" cy="14" r="13" fill="rgba(0,0,0,0.5)" stroke="#1a2a3a" stroke-width="1"/><line x1="${bx}" y1="${by}" x2="${tx}" y2="${ty}" stroke="${catC2}" stroke-width="2" stroke-linecap="round"/><polygon points="${tx},${ty} ${bx+hw*Math.cos(pa)},${by+hw*Math.sin(pa)} ${bx-hw*Math.cos(pa)},${by-hw*Math.sin(pa)}" fill="${catC2}"/><circle cx="14" cy="14" r="2" fill="${catC2}"/></svg>`;
  }

  const panel=document.createElement('div');
  panel.id='drag-panel';
  panel.innerHTML=`
    <div id="drag-handle" style="cursor:grab;background:rgba(0,200,240,0.08);border-bottom:1px solid var(--border);padding:5px 10px 5px 10px;display:flex;align-items:center;justify-content:space-between;user-select:none;">
      <span style="font-size:0.6rem;color:var(--dim);letter-spacing:1px;">⠿ DRAG TO MOVE</span>
      <button onclick="closeDragPanel()" style="background:none;border:none;color:var(--dim);font-size:1rem;cursor:pointer;padding:0 2px;line-height:1;">&times;</button>
    </div>
    <div style="padding:10px 14px;">
      <div class="popup-icao">${ap.icao} <span class="wx-badge ${catC}">${mx?mx.flightCat:'…'}</span></div>
      <div class="popup-name">${ap.name}</div>
      ${MSA_DATA[ap.icao]?`<div style="font-size:0.62rem;color:#ffcc00;letter-spacing:1px;">MSA ${MSA_DATA[ap.icao]}ft</div>`:''}
      ${SAFE100_DATA[ap.icao]?`<div style="font-size:0.62rem;color:#00c8f0;letter-spacing:1px;">SAFE 100NM ${SAFE100_DATA[ap.icao]}ft</div>`:''}
      <div class="popup-wind">${miniComp}${windStr}</div>
      ${mx?`<div class="popup-metar">${mx.raw}</div>`:''}
      ${RWY_LENGTHS[ap.icao]?`<div style="margin-top:6px;font-size:0.61rem;color:var(--dim);">` +
        Object.entries(RWY_LENGTHS[ap.icao]).map(([pair,len])=>
          `<span style="color:var(--accent);font-family:'Rajdhani',sans-serif;">${pair}</span> <span style="color:var(--text);">${len.toLocaleString()} ft</span>`
        ).join('<span style="color:var(--border);margin:0 5px;">|</span>')
        +`</div>`:''}
      ${ap.approaches.length>0?`<div style="font-size:0.6rem;color:var(--dim);margin-top:3px">${ap.approaches.length} approach procedures available</div>`:''}
      <button class="popup-btn" onclick="selectAirport('${ap.icao}')">▸ DETAIL &amp; APPROACHES</button>
    </div>`;

  Object.assign(panel.style,{
    position:'absolute', zIndex:9999, width:'320px',
    background:'var(--panel)', border:'1px solid var(--border)',
    borderRadius:'3px', boxShadow:'0 4px 20px rgba(0,0,0,0.6)',
    fontFamily:"'IBM Plex Mono',monospace", fontSize:'0.72rem',
    color:'var(--text)', left: Math.max(4, screenX-360)+'px', top: Math.max(4, screenY-20)+'px',
    pointerEvents:'all'
  });

  document.getElementById('map').appendChild(panel);
  _dragPanel=panel;

  // Drag logic — disable map drag while moving panel
  const handle=panel.querySelector('#drag-handle');
  let dragging=false, ox=0, oy=0;

  function startDrag(clientX, clientY){
    dragging=true;
    ox=clientX-panel.offsetLeft; oy=clientY-panel.offsetTop;
    handle.style.cursor='grabbing';
    // Disable Leaflet map dragging so the map stays still
    map.dragging.disable();
    map.touchZoom.disable();
  }
  function moveDrag(clientX, clientY){
    if(!dragging)return;
    // Keep panel within map bounds
    const mapEl=document.getElementById('map');
    const maxX=mapEl.offsetWidth-panel.offsetWidth;
    const maxY=mapEl.offsetHeight-panel.offsetHeight;
    const newX=Math.min(Math.max(0, clientX-ox), maxX);
    const newY=Math.min(Math.max(0, clientY-oy), maxY);
    panel.style.left=newX+'px'; panel.style.top=newY+'px';
  }
  function endDrag(){
    if(!dragging)return;
    dragging=false;
    handle.style.cursor='grab';
    // Re-enable Leaflet map dragging
    map.dragging.enable();
    map.touchZoom.enable();
    // Flag to prevent map click from closing panel after drag release
    _justDragged=true;
    setTimeout(()=>{_justDragged=false;}, 200);
  }

  handle.addEventListener('mousedown',e=>{
    startDrag(e.clientX, e.clientY);
    e.preventDefault();
    e.stopPropagation();
  });
  handle.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startDrag(t.clientX, t.clientY);
    e.preventDefault();
    e.stopPropagation();
  },{passive:false});
  document.addEventListener('mousemove',e=>{ moveDrag(e.clientX, e.clientY); });
  document.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const t=e.touches[0];
    moveDrag(t.clientX, t.clientY);
    e.preventDefault();
  },{passive:false});
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
}

function buildPopup(ap) { return ''; } // unused — kept for safety

function updateMarkersWithMetar() {
  AIRPORTS.forEach(ap=>{
    const m=metarData[ap.icao];
    const cat=m?m.flightCat:'UNKNOWN';
    if(markers[ap.icao]) markers[ap.icao].setIcon(makeMarkerIcon(cat,ap.approaches.length>0));
  });
  buildList();
  if(selectedIcao) drawMapWindCompass(selectedIcao);
}

function drawRunwayLabels() {
  if(rwyLabelLayer) { map.removeLayer(rwyLabelLayer); rwyLabelLayer=null; }
  const zoom = map.getZoom();
  if(zoom < 12) return;
  const bounds = map.getBounds();
  rwyLabelLayer = L.layerGroup();

  const fs = zoom >= 15 ? 11 : zoom >= 13 ? 9 : 8;
  const pad = zoom >= 15 ? '2px 5px' : '1px 4px';

  Object.entries(RWY_DATA).forEach(([icao, rwys]) => {
    rwys.forEach(r => {
      if(!bounds.contains([r.lat, r.lon])) return;
      // Use a wrapper div sized to 1x1 at the geo point; the label uses absolute
      // positioning to centre itself — this keeps the anchor geo-locked through
      // pan, zoom, and window resize without Leaflet trying to offset a fixed pixel size.
      const w = r.rwy.length > 2 ? 44 : 32;  // wider box for e.g. "06L"
      const h = fs + 8;
      const icon = L.divIcon({
        html: `<div style="position:relative;width:${w}px;height:${h}px;"><div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:Rajdhani,sans-serif;font-size:${fs}px;font-weight:900;color:#0a0e1a;background:#e8f4ff;border:1.5px solid #00c8f0;border-radius:2px;padding:${pad};white-space:nowrap;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,0.7);letter-spacing:1px;">${r.rwy}</div></div>`,
        iconSize: [w, h],
        iconAnchor: [w/2, h/2],
        className: ''
      });
      L.marker([r.lat, r.lon], {icon, interactive:false}).addTo(rwyLabelLayer);
    });
  });
  rwyLabelLayer.addTo(map);
}

function init() {
  // 1. Init map immediately — no waiting
  map=L.map('map',{center:[46,-82],zoom:6,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);

  // 2. Plot all airports with neutral icons right away
  AIRPORTS.forEach(ap=>{
    const marker=L.marker([ap.lat,ap.lon],{icon:makeMarkerIcon('UNKNOWN',ap.approaches.length>0)}).addTo(map);
    marker.on('click',function(e){
      const p=map.latLngToContainerPoint(e.latlng);
      showDragPanel(ap, p.x, p.y);
      L.DomEvent.stopPropagation(e);
    });
    markers[ap.icao]=marker;
  });

  // 3. Show UI immediately
  const loader=document.getElementById('loader');if(loader)loader.style.display='none';
  buildList();
  showTab('list');

  // 4. Draw runway labels on zoom/pan
  map.on('zoomend moveend', () => { drawRunwayLabels(); });
  map.on('click', () => { if(!_justDragged) closeDragPanel(); });


  // 5. Fetch METARs in background — silently update when done
  const badge=document.getElementById('live-badge-text');
  if(badge) badge.textContent='FETCHING…';
  fetchMETARs().then(()=>{
    updateMarkersWithMetar();
    if(selectedIcao) renderDetail(selectedIcao);
  });

  // Auto-refresh METAR every 5 minutes
  setInterval(() => {
    refreshMETARs();
  }, 5 * 60 * 1000);

  // Update age label every minute
  setInterval(() => {
    if(lastFetchTime) updateAgeLabel(currentSource);
  }, 60000);
}
init();
</script>
